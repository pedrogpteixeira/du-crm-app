<section class="team-detail-page">
  <p class="loading" *ngIf="isLoading">
    A carregar equipa...
  </p>

  <p class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </p>

  <ng-container *ngIf="team">
    <div class="breadcrumb">
      <a routerLink="/home/teams">
        Equipas
      </a>

      <span>›</span>

      <strong>
        {{ team.name }}
      </strong>
    </div>

    <header class="page-header">
      <div>
        <h1>{{ team.name }}</h1>

        <p>{{ team.role }}</p>
      </div>
    </header>

    <div class="detail-grid">
      <article class="card">
        <div class="section-title">
          Informação da equipa
        </div>

        <div class="info-grid">
          <label>
            Nome
            <strong>{{ team.name }}</strong>
          </label>

          <label>
            Função
            <strong>{{ team.role }}</strong>
          </label>

          <label>
            Estado
            <strong>{{ team.active ? 'Ativa' : 'Inativa' }}</strong>
          </label>

          <label>
            Cargos
            <div class="positions-stack">
              <span
                class="position-item"
                *ngFor="let position of team.positionList"
              >
                {{ position }}
              </span>
            </div>
          </label>
        </div>
      </article>

      <article class="card users-card">
        <div class="section-title">
          Utilizadores da equipa
        </div>

        <div class="users-list" *ngIf="users.length; else noUsers">
            <a
            class="user-row"
            *ngFor="let user of users"
            [routerLink]="['/home/users', user.id]"
            >
            <div class="user-cell">
                <div class="avatar">
                <img
                    *ngIf="getProfilePictureUrl(user); else initials"
                    [src]="getProfilePictureUrl(user)"
                    [alt]="user.name"
                />

                <ng-template #initials>
                    {{ getInitial(user.name) }}
                </ng-template>
                </div>

                <div>
                <strong>{{ user.name }}</strong>
                <span>{{ user.role || 'Sem cargo selecionado' }}</span>
                </div>
            </div>
            </a>
        </div>

        <ng-template #noUsers>
          <p class="empty-state">
            Esta equipa ainda não tem utilizadores.
          </p>
        </ng-template>
      </article>
    </div>
  </ng-container>
</section>
