<section class="knowledge-page">
  <header class="page-header">
    <div>
      <h1>Base de Conhecimento</h1>

      <p>
        Consulta campanhas, formulários de adesão e formações por empresa.
      </p>
    </div>
  </header>

  <p class="loading" *ngIf="isLoading">
    A carregar base de conhecimento...
  </p>

  <p class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </p>

  <section class="companies-grid" *ngIf="!isLoading">
    <article
      class="company-card"
      *ngFor="let company of getVisibleCompanies()"
    >
      <div class="company-logo">
        <img
          [src]="company.logo"
          [alt]="company.name"
        />
      </div>

      <button
        type="button"
        class="company-action"
        (click)="openCompanyAction(company, 'campaigns')"
      >
        <span class="action-icon material-symbols-rounded">
          business_center
        </span>

        <span>Campanhas</span>

        <strong>›</strong>
      </button>

      <button
        type="button"
        class="company-action"
        (click)="openCompanyAction(company, 'forms')"
      >
        <span class="action-icon material-symbols-rounded">
          description
        </span>

        <span>Formulários de Adesão</span>

        <strong>›</strong>
      </button>

      <button
        type="button"
        class="company-action"
        (click)="openCompanyAction(company, 'training')"
      >
        <span class="action-icon material-symbols-rounded">
          school
        </span>

        <span>Formações</span>

        <strong>›</strong>
      </button>
    </article>
  </section>

  <p
    class="empty-state"
    *ngIf="!isLoading && !getVisibleCompanies().length"
  >
    Ainda não existem empresas disponíveis na base de conhecimento.
  </p>
</section>
