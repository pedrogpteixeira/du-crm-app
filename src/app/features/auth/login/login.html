<div class="auth-page">
  <section class="auth-card">
    <div class="brand">
      <div class="brand-icon">DU</div>

      <div>
        <h1>Welcome back</h1>
        <p>Sign in to access your CRM workspace.</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Username
        <input type="text" placeholder="Username" formControlName="username" />
      </label>

      <label>
        Password
        <input type="password" placeholder="Enter your password" formControlName="password" />
      </label>

      <p class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="switch">
      Don’t have an account?
      <a routerLink="/signup">Create account</a>
    </p>
  </section>
</div>
