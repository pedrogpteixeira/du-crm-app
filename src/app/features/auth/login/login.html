<div class="auth-page">
  <section class="auth-card">
    <div class="brand">
      <div class="brand-icon">DU</div>

      <div>
        <h1>Bem-vindo de volta</h1>
        <p>Inicie sessão para aceder ao seu espaço de trabalho no CRM.</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Nome de utilizador
        <input type="text" placeholder="Nome de utilizador" formControlName="username" />
      </label>

      <label>
        Palavra-passe
        <input type="password" placeholder="Digite a sua palavra-passe" formControlName="password" />
      </label>

      <p class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'A iniciar sessão...' : 'Iniciar sessão' }}
      </button>
    </form>

    <p class="switch">
      Não tem uma conta?
      <a routerLink="/signup">Criar conta</a>
    </p>
  </section>
</div>
